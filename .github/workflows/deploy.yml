name: TreeSeed API Deployment Redirect

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - prod

permissions:
  contents: read

jobs:
  redirect:
    runs-on: ubuntu-latest
    steps:
      - name: Use the root-owned deployment workflow
        shell: bash
        run: |
          if [[ "${{ inputs.environment }}" == "staging" ]]; then
            echo "API staging is deployed and proved by the root Treeseed Staging Candidate workflow." >> "${GITHUB_STEP_SUMMARY}"
            echo "Run: npx trsd stage --json" >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "API production is promoted only from an attested candidate by the root Treeseed Production Release workflow." >> "${GITHUB_STEP_SUMMARY}"
            echo "Run: npx trsd release --patch --json" >> "${GITHUB_STEP_SUMMARY}"
          fi
          exit 1
