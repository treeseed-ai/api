name: TreeSeed API Deploy

on:
  push:
    branches:
      - staging
    tags:
      - '*.*.*'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - prod
      action_kind:
        description: Workflow action to perform
        required: true
        default: deploy_api
        type: choice
        options:
          - deploy_api
          - verify_live
          - acceptance

concurrency:
  group: treeseed-api-deploy-${{ github.ref }}-${{ inputs.environment || 'auto' }}
  cancel-in-progress: false

jobs:
  classify:
    runs-on: ubuntu-latest
    outputs:
      scope: ${{ steps.classify.outputs.scope }}
      workflow_action: ${{ steps.classify.outputs.workflow_action }}
      release_tag: ${{ steps.classify.outputs.release_tag }}
      api_changed: ${{ steps.classify.outputs.api_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: classify
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            scope="${{ inputs.environment }}"
            workflow_action="${{ inputs.action_kind }}"
            release_tag="false"
            api_changed="true"
          else
            scope=$([[ "${GITHUB_REF_TYPE}" == "tag" ]] && echo "prod" || echo "staging")
            workflow_action="deploy_api"
            release_tag=$([[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] && echo "true" || echo "false")
            compare_ref="${{ github.event.before }}"
            if [[ -z "${compare_ref}" || "${compare_ref}" == "0000000000000000000000000000000000000000" ]]; then
              compare_ref="$(git rev-list --max-count=1 "${GITHUB_SHA}^" 2>/dev/null || true)"
            fi
            api_changed="false"
            if [[ -z "${compare_ref}" || "${release_tag}" == "true" ]]; then
              api_changed="true"
            else
              while IFS= read -r path; do
                [[ -z "${path}" ]] && continue
                case "${path}" in
                  src/**|scripts/**|test/**|Dockerfile|compose.yml|.dockerignore|treeseed.package.yaml|treeseed.site.yaml|src/env.yaml|package.json|package-lock.json|.github/workflows/**)
                    api_changed="true"
                    ;;
                esac
              done < <(git diff --name-only "${compare_ref}" "${GITHUB_SHA}")
            fi
          fi
          {
            echo "scope=${scope}"
            echo "workflow_action=${workflow_action}"
            echo "release_tag=${release_tag}"
            echo "api_changed=${api_changed}"
          } >> "${GITHUB_OUTPUT}"

  verify:
    needs: classify
    if: |
      needs.classify.outputs.workflow_action == 'deploy_api' ||
      needs.classify.outputs.workflow_action == 'verify_live' ||
      needs.classify.outputs.workflow_action == 'acceptance' ||
      needs.classify.outputs.api_changed == 'true' ||
      needs.classify.outputs.release_tag == 'true'
    runs-on: ubuntu-latest
    services:
      mailpit:
        image: axllent/mailpit:v1.21
        ports:
          - 1025:1025
          - 8025:8025
    env:
      CI: "true"
      TREESEED_GITHUB_AUTOMATION_MODE: stub
      TREESEED_STAGE_WAIT_MODE: skip
      TREESEED_AGENT_DISABLE_GIT: "true"
      TREESEED_MAILPIT_URL: http://127.0.0.1:8025
      TREESEED_MAILPIT_SMTP_HOST: 127.0.0.1
      TREESEED_MAILPIT_SMTP_PORT: "1025"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci --workspaces=false
      - name: Wait for Mailpit
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:8025/api/v1/messages >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Mailpit did not become ready" >&2
          exit 1
      - name: Verify API package
        run: npm run verify:direct

  deploy-api:
    needs:
      - classify
      - verify
    if: |
      always() &&
      needs.verify.result == 'success' &&
      (
        needs.classify.outputs.workflow_action == 'deploy_api' ||
        needs.classify.outputs.api_changed == 'true' ||
        needs.classify.outputs.release_tag == 'true'
      )
    runs-on: ubuntu-latest
    environment: ${{ needs.classify.outputs.scope == 'prod' && 'production' || 'staging' }}
    permissions:
      contents: read
    env:
      TREESEED_CLOUDFLARE_API_TOKEN: ${{ secrets.TREESEED_CLOUDFLARE_API_TOKEN }}
      TREESEED_CLOUDFLARE_ACCOUNT_ID: ${{ vars.TREESEED_CLOUDFLARE_ACCOUNT_ID }}
      TREESEED_RAILWAY_API_TOKEN: ${{ secrets.TREESEED_RAILWAY_API_TOKEN }}
      TREESEED_RAILWAY_WORKSPACE: ${{ vars.TREESEED_RAILWAY_WORKSPACE }}
      TREESEED_RAILWAY_PROJECT_ID: ${{ vars.TREESEED_RAILWAY_PROJECT_ID }}
      TREESEED_WORKFLOW_ENVIRONMENT: ${{ needs.classify.outputs.scope }}
      TREESEED_HOSTING_KIND: ${{ vars.TREESEED_HOSTING_KIND }}
      TREESEED_HOSTING_REGISTRATION: ${{ vars.TREESEED_HOSTING_REGISTRATION }}
      TREESEED_CENTRAL_MARKET_API_BASE_URL: ${{ vars.TREESEED_CENTRAL_MARKET_API_BASE_URL }}
      TREESEED_LIVE_API_BASE_URL: ${{ needs.classify.outputs.scope == 'prod' && 'https://api.treeseed.dev' || 'https://api.preview.treeseed.dev' }}
      TREESEED_API_BASE_URL: ${{ vars.TREESEED_API_BASE_URL || (needs.classify.outputs.scope == 'prod' && 'https://api.treeseed.dev' || 'https://api.preview.treeseed.dev') }}
      TREESEED_CATALOG_MARKET_API_BASE_URLS: ${{ vars.TREESEED_CATALOG_MARKET_API_BASE_URLS }}
      TREESEED_SMTP_HOST: ${{ vars.TREESEED_SMTP_HOST }}
      TREESEED_SMTP_PORT: ${{ vars.TREESEED_SMTP_PORT }}
      TREESEED_SMTP_USERNAME: ${{ vars.TREESEED_SMTP_USERNAME }}
      TREESEED_SMTP_FROM: ${{ vars.TREESEED_SMTP_FROM }}
      TREESEED_SMTP_REPLY_TO: ${{ vars.TREESEED_SMTP_REPLY_TO }}
      TREESEED_HOSTED_HUBS_GITHUB_OWNER: ${{ vars.TREESEED_HOSTED_HUBS_GITHUB_OWNER }}
      TREESEED_GITHUB_TOKEN: ${{ secrets.TREESEED_GITHUB_TOKEN }}
      TREESEED_PLATFORM_RUNNER_SECRET: ${{ secrets.TREESEED_PLATFORM_RUNNER_SECRET }}
      TREESEED_CREDENTIAL_SESSION_SECRET: ${{ secrets.TREESEED_CREDENTIAL_SESSION_SECRET }}
      TREESEED_SMTP_PASSWORD: ${{ secrets.TREESEED_SMTP_PASSWORD }}
      TREESEED_WEB_ASSERTION_SECRET: ${{ secrets.TREESEED_WEB_ASSERTION_SECRET }}
      TREESEED_HOSTED_HUBS_GITHUB_TOKEN: ${{ secrets.TREESEED_HOSTED_HUBS_GITHUB_TOKEN }}
      TREESEED_WEB_SERVICE_ID: ${{ vars.TREESEED_WEB_SERVICE_ID || vars.TREESEED_API_WEB_SERVICE_ID || 'web' }}
      TREESEED_WEB_SERVICE_SECRET: ${{ secrets.TREESEED_WEB_SERVICE_SECRET || secrets.TREESEED_API_WEB_SERVICE_SECRET }}
      TREESEED_PUBLIC_TREEDX_IMAGE_REF: ${{ needs.classify.outputs.scope == 'prod' && (vars.TREESEED_PUBLIC_TREEDX_IMAGE_REF || '') || '' }}
      TREESEED_API_IMAGE_REF: ${{ needs.classify.outputs.scope == 'prod' && (needs.classify.outputs.release_tag == 'true' && format('treeseed/api:{0}', github.ref_name) || vars.TREESEED_API_IMAGE_REF || '') || '' }}
      TREESEED_OPERATIONS_RUNNER_IMAGE_REF: ${{ needs.classify.outputs.scope == 'prod' && (needs.classify.outputs.release_tag == 'true' && format('treeseed/op-runner:{0}', github.ref_name) || vars.TREESEED_OPERATIONS_RUNNER_IMAGE_REF || '') || '' }}
      TREESEED_RAILWAY_DEPLOY_TRANSPORT: ${{ vars.TREESEED_RAILWAY_DEPLOY_TRANSPORT || 'api' }}
      TREESEED_KEY_AGENT_TRANSPORT: inline
      TREESEED_KEY_PASSPHRASE: treeseed-api-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.job }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: |
          npm ci --ignore-scripts --workspaces=false || (echo "dependency install failed; retrying" && npm ci --ignore-scripts --workspaces=false)
          npm rebuild @treeseed/sdk --workspaces=false
      - name: Prepare Treeseed secret session
        run: node --import tsx ./node_modules/@treeseed/cli/src/cli/main.ts secrets:unlock --from-env --create-if-missing --json
      - name: Resolve production image refs
        if: needs.classify.outputs.scope == 'prod'
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${TREESEED_API_IMAGE_REF:-}" || -z "${TREESEED_OPERATIONS_RUNNER_IMAGE_REF:-}" ]]; then
            echo "Production API deploy requires TREESEED_API_IMAGE_REF and TREESEED_OPERATIONS_RUNNER_IMAGE_REF." >&2
            exit 1
          fi
          if [[ -z "${TREESEED_PUBLIC_TREEDX_IMAGE_REF:-}" ]]; then
            echo "Production API deploy requires TREESEED_PUBLIC_TREEDX_IMAGE_REF from the release graph." >&2
            exit 1
          fi
      - name: Wait for production image manifests
        if: needs.classify.outputs.scope == 'prod'
        shell: bash
        run: |
          set -euo pipefail
          images=(
            "${TREESEED_API_IMAGE_REF}"
            "${TREESEED_OPERATIONS_RUNNER_IMAGE_REF}"
            "${TREESEED_PUBLIC_TREEDX_IMAGE_REF}"
          )
          for image in "${images[@]}"; do
            if [[ -z "${image}" || "${image}" != *:* || "${image}" == *:latest ]]; then
              echo "Production image ref must be an immutable semantic tag, got '${image}'." >&2
              exit 1
            fi
            echo "Waiting for Docker Hub manifest: ${image}"
            for attempt in {1..60}; do
              if docker manifest inspect "${image}" >/dev/null 2>&1; then
                echo "Docker Hub manifest is available: ${image}"
                continue 2
              fi
              sleep 10
            done
            echo "Docker Hub manifest did not become available: ${image}" >&2
            exit 1
          done
      - name: Plan API reconciliation
        run: node --import tsx ./node_modules/@treeseed/cli/src/cli/main.ts hosting plan --environment "${TREESEED_WORKFLOW_ENVIRONMENT}" --app api --json
      - name: Reconcile API app
        run: node --import tsx ./node_modules/@treeseed/cli/src/cli/main.ts hosting apply --environment "${TREESEED_WORKFLOW_ENVIRONMENT}" --app api --json

  live-verify:
    needs:
      - classify
      - verify
      - deploy-api
    if: |
      always() &&
      needs.verify.result == 'success' &&
      (needs.deploy-api.result == 'success' || needs.deploy-api.result == 'skipped') &&
      (
        needs.classify.outputs.workflow_action == 'deploy_api' ||
        needs.classify.outputs.workflow_action == 'verify_live' ||
        needs.classify.outputs.workflow_action == 'acceptance' ||
        needs.classify.outputs.api_changed == 'true' ||
        needs.classify.outputs.release_tag == 'true'
      )
    runs-on: ubuntu-latest
    environment: ${{ needs.classify.outputs.scope == 'prod' && 'production' || 'staging' }}
    permissions:
      contents: read
    env:
      TREESEED_CLOUDFLARE_API_TOKEN: ${{ secrets.TREESEED_CLOUDFLARE_API_TOKEN }}
      TREESEED_CLOUDFLARE_ACCOUNT_ID: ${{ vars.TREESEED_CLOUDFLARE_ACCOUNT_ID }}
      TREESEED_RAILWAY_API_TOKEN: ${{ secrets.TREESEED_RAILWAY_API_TOKEN }}
      TREESEED_RAILWAY_WORKSPACE: ${{ vars.TREESEED_RAILWAY_WORKSPACE }}
      TREESEED_RAILWAY_PROJECT_ID: ${{ vars.TREESEED_RAILWAY_PROJECT_ID }}
      TREESEED_WORKFLOW_ENVIRONMENT: ${{ needs.classify.outputs.scope }}
      TREESEED_HOSTING_KIND: ${{ vars.TREESEED_HOSTING_KIND }}
      TREESEED_HOSTING_REGISTRATION: ${{ vars.TREESEED_HOSTING_REGISTRATION }}
      TREESEED_CENTRAL_MARKET_API_BASE_URL: ${{ vars.TREESEED_CENTRAL_MARKET_API_BASE_URL }}
      TREESEED_LIVE_API_BASE_URL: ${{ needs.classify.outputs.scope == 'prod' && 'https://api.treeseed.dev' || 'https://api.preview.treeseed.dev' }}
      TREESEED_API_BASE_URL: ${{ vars.TREESEED_API_BASE_URL || (needs.classify.outputs.scope == 'prod' && 'https://api.treeseed.dev' || 'https://api.preview.treeseed.dev') }}
      TREESEED_CATALOG_MARKET_API_BASE_URLS: ${{ vars.TREESEED_CATALOG_MARKET_API_BASE_URLS }}
      TREESEED_SMTP_HOST: ${{ vars.TREESEED_SMTP_HOST }}
      TREESEED_SMTP_PORT: ${{ vars.TREESEED_SMTP_PORT }}
      TREESEED_SMTP_USERNAME: ${{ vars.TREESEED_SMTP_USERNAME }}
      TREESEED_SMTP_FROM: ${{ vars.TREESEED_SMTP_FROM }}
      TREESEED_SMTP_REPLY_TO: ${{ vars.TREESEED_SMTP_REPLY_TO }}
      TREESEED_HOSTED_HUBS_GITHUB_OWNER: ${{ vars.TREESEED_HOSTED_HUBS_GITHUB_OWNER }}
      TREESEED_GITHUB_TOKEN: ${{ secrets.TREESEED_GITHUB_TOKEN }}
      TREESEED_PLATFORM_RUNNER_SECRET: ${{ secrets.TREESEED_PLATFORM_RUNNER_SECRET }}
      TREESEED_CREDENTIAL_SESSION_SECRET: ${{ secrets.TREESEED_CREDENTIAL_SESSION_SECRET }}
      TREESEED_SMTP_PASSWORD: ${{ secrets.TREESEED_SMTP_PASSWORD }}
      TREESEED_WEB_ASSERTION_SECRET: ${{ secrets.TREESEED_WEB_ASSERTION_SECRET }}
      TREESEED_HOSTED_HUBS_GITHUB_TOKEN: ${{ secrets.TREESEED_HOSTED_HUBS_GITHUB_TOKEN }}
      TREESEED_WEB_SERVICE_ID: ${{ vars.TREESEED_WEB_SERVICE_ID || vars.TREESEED_API_WEB_SERVICE_ID || 'web' }}
      TREESEED_WEB_SERVICE_SECRET: ${{ secrets.TREESEED_WEB_SERVICE_SECRET || secrets.TREESEED_API_WEB_SERVICE_SECRET }}
      TREESEED_PUBLIC_TREEDX_IMAGE_REF: ${{ needs.classify.outputs.scope == 'prod' && (vars.TREESEED_PUBLIC_TREEDX_IMAGE_REF || '') || '' }}
      TREESEED_API_IMAGE_REF: ${{ needs.classify.outputs.scope == 'prod' && (needs.classify.outputs.release_tag == 'true' && format('treeseed/api:{0}', github.ref_name) || vars.TREESEED_API_IMAGE_REF || '') || '' }}
      TREESEED_OPERATIONS_RUNNER_IMAGE_REF: ${{ needs.classify.outputs.scope == 'prod' && (needs.classify.outputs.release_tag == 'true' && format('treeseed/op-runner:{0}', github.ref_name) || vars.TREESEED_OPERATIONS_RUNNER_IMAGE_REF || '') || '' }}
      TREESEED_KEY_AGENT_TRANSPORT: inline
      TREESEED_KEY_PASSPHRASE: treeseed-api-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.job }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: |
          npm ci --ignore-scripts --workspaces=false || (echo "dependency install failed; retrying" && npm ci --ignore-scripts --workspaces=false)
          npm rebuild @treeseed/sdk --workspaces=false
      - name: Prepare Treeseed secret session
        run: node --import tsx ./node_modules/@treeseed/cli/src/cli/main.ts secrets:unlock --from-env --create-if-missing --json
      - name: Resolve live API service credentials
        shell: bash
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import { appendFileSync } from 'node:fs';
          const { resolveTreeseedMachineEnvironmentValues } = await import('@treeseed/sdk/workflow-support');
          const scope = process.env.TREESEED_WORKFLOW_ENVIRONMENT === 'prod' ? 'prod' : 'staging';
          const configured = resolveTreeseedMachineEnvironmentValues(process.cwd(), scope);
          const variables = { ...configured, ...process.env };
          const serviceId = variables.TREESEED_WEB_SERVICE_ID || variables.TREESEED_API_WEB_SERVICE_ID || 'web';
          const serviceSecret = variables.TREESEED_WEB_SERVICE_SECRET || variables.TREESEED_API_WEB_SERVICE_SECRET;
          if (!serviceSecret) {
            console.error(`Live API service credential is missing from Treeseed ${scope} machine config.`);
            process.exit(1);
          }
          const delimiter = `TRESEED_SERVICE_SECRET_${Date.now()}`;
          process.stdout.write(`::add-mask::${serviceSecret}\n`);
          appendFileSync(process.env.GITHUB_ENV, `TREESEED_ACCEPTANCE_SERVICE_ID=${serviceId}\n`);
          appendFileSync(process.env.GITHUB_ENV, `TREESEED_ACCEPTANCE_SERVICE_SECRET<<${delimiter}\n${serviceSecret}\n${delimiter}\n`);
          NODE
      - name: Verify API hosting live
        run: node --import tsx ./node_modules/@treeseed/cli/src/cli/main.ts hosting verify --environment "${TREESEED_WORKFLOW_ENVIRONMENT}" --app api --live --json
      - name: Run operations runner smoke
        run: node --import tsx ./node_modules/@treeseed/cli/src/cli/main.ts operations smoke --environment "${TREESEED_WORKFLOW_ENVIRONMENT}" --service operationsRunner --json
      - name: Run live API acceptance
        run: |
          mkdir -p reports
          npx --yes tsx ./scripts/api-acceptance.ts \
            --environment "${TREESEED_WORKFLOW_ENVIRONMENT}" \
            --base-url "${TREESEED_LIVE_API_BASE_URL}" \
            --report-json reports/api-acceptance.json \
            --report-junit reports/api-acceptance.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-acceptance-${{ needs.classify.outputs.scope }}
          path: reports/
