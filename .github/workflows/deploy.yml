name: TreeSeed API Deploy

on:
  push:
    branches:
      - staging
    tags:
      - '*.*.*'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - prod
      action_kind:
        description: Workflow action to perform
        required: true
        default: deploy_api
        type: choice
        options:
          - deploy_api
          - verify_live
          - acceptance

concurrency:
  group: treeseed-api-deploy-${{ github.ref }}-${{ inputs.environment || 'auto' }}
  cancel-in-progress: false

jobs:
  classify:
    runs-on: ubuntu-latest
    outputs:
      scope: ${{ steps.classify.outputs.scope }}
      workflow_action: ${{ steps.classify.outputs.workflow_action }}
      release_tag: ${{ steps.classify.outputs.release_tag }}
      api_changed: ${{ steps.classify.outputs.api_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: classify
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            scope="${{ inputs.environment }}"
            workflow_action="${{ inputs.action_kind }}"
            release_tag="false"
            api_changed="true"
          else
            scope=$([[ "${GITHUB_REF_TYPE}" == "tag" ]] && echo "prod" || echo "staging")
            workflow_action="deploy_api"
            release_tag=$([[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] && echo "true" || echo "false")
            compare_ref="${{ github.event.before }}"
            if [[ -z "${compare_ref}" || "${compare_ref}" == "0000000000000000000000000000000000000000" ]]; then
              compare_ref="$(git rev-list --max-count=1 "${GITHUB_SHA}^" 2>/dev/null || true)"
            fi
            api_changed="false"
            if [[ -z "${compare_ref}" || "${release_tag}" == "true" ]]; then
              api_changed="true"
            else
              while IFS= read -r path; do
                [[ -z "${path}" ]] && continue
                case "${path}" in
                  src/**|scripts/**|test/**|Dockerfile|compose.yml|.dockerignore|treeseed.package.yaml|treeseed.site.yaml|src/env.yaml|package.json|package-lock.json|.github/workflows/**)
                    api_changed="true"
                    ;;
                esac
              done < <(git diff --name-only "${compare_ref}" "${GITHUB_SHA}")
            fi
          fi
          {
            echo "scope=${scope}"
            echo "workflow_action=${workflow_action}"
            echo "release_tag=${release_tag}"
            echo "api_changed=${api_changed}"
          } >> "${GITHUB_OUTPUT}"

  verify:
    needs: classify
    if: |
      needs.classify.outputs.workflow_action == 'deploy_api' ||
      needs.classify.outputs.workflow_action == 'verify_live' ||
      needs.classify.outputs.workflow_action == 'acceptance' ||
      needs.classify.outputs.api_changed == 'true' ||
      needs.classify.outputs.release_tag == 'true'
    runs-on: ubuntu-latest
    services:
      mailpit:
        image: axllent/mailpit:v1.21
        ports:
          - 1025:1025
          - 8025:8025
    env:
      CI: "true"
      TREESEED_GITHUB_AUTOMATION_MODE: stub
      TREESEED_STAGE_WAIT_MODE: skip
      TREESEED_AGENT_DISABLE_GIT: "true"
      TREESEED_MAILPIT_URL: http://127.0.0.1:8025
      TREESEED_MAILPIT_SMTP_HOST: 127.0.0.1
      TREESEED_MAILPIT_SMTP_PORT: "1025"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci --workspaces=false
      - name: Wait for Mailpit
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:8025/api/v1/messages >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Mailpit did not become ready" >&2
          exit 1
      - name: Verify API package
        run: npm run verify:direct

  deploy-api:
    needs:
      - classify
      - verify
    if: |
      always() &&
      needs.verify.result == 'success' &&
      (
        needs.classify.outputs.workflow_action == 'deploy_api' ||
        needs.classify.outputs.api_changed == 'true' ||
        needs.classify.outputs.release_tag == 'true'
      )
    runs-on: ubuntu-latest
    environment: ${{ needs.classify.outputs.scope == 'prod' && 'production' || 'staging' }}
    permissions:
      contents: read
    env:
      TREESEED_CLOUDFLARE_API_TOKEN: ${{ secrets.TREESEED_CLOUDFLARE_API_TOKEN }}
      TREESEED_CLOUDFLARE_ACCOUNT_ID: ${{ vars.TREESEED_CLOUDFLARE_ACCOUNT_ID }}
      TREESEED_RAILWAY_API_TOKEN: ${{ secrets.TREESEED_RAILWAY_API_TOKEN }}
      TREESEED_RAILWAY_WORKSPACE: ${{ vars.TREESEED_RAILWAY_WORKSPACE }}
      TREESEED_RAILWAY_PROJECT_ID: ${{ vars.TREESEED_RAILWAY_PROJECT_ID }}
      TREESEED_WORKFLOW_ENVIRONMENT: ${{ needs.classify.outputs.scope }}
      TREESEED_PUBLIC_TREEDX_IMAGE_REF: ${{ vars.TREESEED_PUBLIC_TREEDX_IMAGE_REF || '' }}
      TREESEED_API_IMAGE_REF: ${{ needs.classify.outputs.scope == 'prod' && (needs.classify.outputs.release_tag == 'true' && format('treeseed/api:{0}', github.ref_name) || vars.TREESEED_API_IMAGE_REF || '') || '' }}
      TREESEED_OPERATIONS_RUNNER_IMAGE_REF: ${{ needs.classify.outputs.scope == 'prod' && (needs.classify.outputs.release_tag == 'true' && format('treeseed/op-runner:{0}', github.ref_name) || vars.TREESEED_OPERATIONS_RUNNER_IMAGE_REF || '') || '' }}
      TREESEED_RAILWAY_DEPLOY_TRANSPORT: ${{ vars.TREESEED_RAILWAY_DEPLOY_TRANSPORT || 'api' }}
      TREESEED_KEY_AGENT_TRANSPORT: inline
      TREESEED_KEY_PASSPHRASE: treeseed-api-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.job }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci --workspaces=false
      - name: Prepare Treeseed secret session
        run: npx trsd secrets:unlock --from-env --create-if-missing --json
      - name: Resolve production image refs
        if: needs.classify.outputs.scope == 'prod'
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${TREESEED_API_IMAGE_REF:-}" || -z "${TREESEED_OPERATIONS_RUNNER_IMAGE_REF:-}" ]]; then
            echo "Production API deploy requires TREESEED_API_IMAGE_REF and TREESEED_OPERATIONS_RUNNER_IMAGE_REF." >&2
            exit 1
          fi
          if [[ -z "${TREESEED_PUBLIC_TREEDX_IMAGE_REF:-}" ]]; then
            tag="$(
              node <<'NODE'
          const url = 'https://registry.hub.docker.com/v2/repositories/treeseed/treedx/tags?page_size=100';
          const response = await fetch(url, { headers: { accept: 'application/json' } });
          if (!response.ok) throw new Error(`Docker Hub tag lookup failed: ${response.status}`);
          const payload = await response.json();
          const versions = (payload.results ?? [])
            .map((entry) => String(entry.name ?? '').trim())
            .filter((name) => /^\d+\.\d+\.\d+$/.test(name))
            .sort((a, b) => {
              const left = a.split('.').map(Number);
              const right = b.split('.').map(Number);
              for (let index = 0; index < 3; index += 1) {
                if (left[index] !== right[index]) return left[index] - right[index];
              }
              return 0;
            });
          const latest = versions.at(-1);
          if (!latest) throw new Error('No semantic treeseed/treedx Docker tags were found.');
          console.log(latest);
          NODE
            )"
            echo "TREESEED_PUBLIC_TREEDX_IMAGE_REF=treeseed/treedx:${tag}" >> "${GITHUB_ENV}"
            echo "Resolved TREESEED_PUBLIC_TREEDX_IMAGE_REF=treeseed/treedx:${tag}"
          fi
      - name: Wait for production image manifests
        if: needs.classify.outputs.scope == 'prod'
        shell: bash
        run: |
          set -euo pipefail
          images=(
            "${TREESEED_API_IMAGE_REF}"
            "${TREESEED_OPERATIONS_RUNNER_IMAGE_REF}"
            "${TREESEED_PUBLIC_TREEDX_IMAGE_REF}"
          )
          for image in "${images[@]}"; do
            if [[ -z "${image}" || "${image}" != *:* || "${image}" == *:latest ]]; then
              echo "Production image ref must be an immutable semantic tag, got '${image}'." >&2
              exit 1
            fi
            echo "Waiting for Docker Hub manifest: ${image}"
            for attempt in {1..60}; do
              if docker manifest inspect "${image}" >/dev/null 2>&1; then
                echo "Docker Hub manifest is available: ${image}"
                continue 2
              fi
              sleep 10
            done
            echo "Docker Hub manifest did not become available: ${image}" >&2
            exit 1
          done
      - name: Plan API reconciliation
        run: npx trsd hosting plan --environment "${TREESEED_WORKFLOW_ENVIRONMENT}" --app api --json
      - name: Reconcile API app
        run: npx trsd hosting apply --environment "${TREESEED_WORKFLOW_ENVIRONMENT}" --app api --execute --json

  live-verify:
    needs:
      - classify
      - verify
      - deploy-api
    if: |
      always() &&
      needs.verify.result == 'success' &&
      (needs.deploy-api.result == 'success' || needs.deploy-api.result == 'skipped') &&
      (
        needs.classify.outputs.workflow_action == 'deploy_api' ||
        needs.classify.outputs.workflow_action == 'verify_live' ||
        needs.classify.outputs.workflow_action == 'acceptance' ||
        needs.classify.outputs.api_changed == 'true' ||
        needs.classify.outputs.release_tag == 'true'
      )
    runs-on: ubuntu-latest
    environment: ${{ needs.classify.outputs.scope == 'prod' && 'production' || 'staging' }}
    permissions:
      contents: read
    env:
      TREESEED_CLOUDFLARE_API_TOKEN: ${{ secrets.TREESEED_CLOUDFLARE_API_TOKEN }}
      TREESEED_CLOUDFLARE_ACCOUNT_ID: ${{ vars.TREESEED_CLOUDFLARE_ACCOUNT_ID }}
      TREESEED_RAILWAY_API_TOKEN: ${{ secrets.TREESEED_RAILWAY_API_TOKEN }}
      TREESEED_RAILWAY_WORKSPACE: ${{ vars.TREESEED_RAILWAY_WORKSPACE }}
      TREESEED_RAILWAY_PROJECT_ID: ${{ vars.TREESEED_RAILWAY_PROJECT_ID }}
      TREESEED_WORKFLOW_ENVIRONMENT: ${{ needs.classify.outputs.scope }}
      TREESEED_API_BASE_URL: ${{ needs.classify.outputs.scope == 'prod' && 'https://api.treeseed.dev' || 'https://api.preview.treeseed.dev' }}
      TREESEED_ACCEPTANCE_SERVICE_ID: ${{ vars.TREESEED_ACCEPTANCE_SERVICE_ID || vars.TREESEED_API_WEB_SERVICE_ID || vars.TREESEED_WEB_SERVICE_ID || 'web' }}
      TREESEED_ACCEPTANCE_SERVICE_SECRET: ${{ secrets.TREESEED_ACCEPTANCE_SERVICE_SECRET || secrets.TREESEED_API_WEB_SERVICE_SECRET || secrets.TREESEED_WEB_SERVICE_SECRET }}
      TREESEED_KEY_AGENT_TRANSPORT: inline
      TREESEED_KEY_PASSPHRASE: treeseed-api-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.job }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci --workspaces=false
      - name: Prepare Treeseed secret session
        run: npx trsd secrets:unlock --from-env --create-if-missing --json
      - name: Verify API hosting live
        run: npx trsd hosting verify --environment "${TREESEED_WORKFLOW_ENVIRONMENT}" --app api --live --json
      - name: Run operations runner smoke
        run: npx trsd operations smoke --environment "${TREESEED_WORKFLOW_ENVIRONMENT}" --service operationsRunner --json
      - name: Run live API acceptance
        run: |
          mkdir -p reports
          npx --yes tsx ./scripts/api-acceptance.ts \
            --environment "${TREESEED_WORKFLOW_ENVIRONMENT}" \
            --base-url "${TREESEED_API_BASE_URL}" \
            --report-json reports/api-acceptance.json \
            --report-junit reports/api-acceptance.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-acceptance-${{ needs.classify.outputs.scope }}
          path: reports/
