name: Development Image TreeSeed API

on:
  workflow_dispatch:
  push:
    branches:
      - staging

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/staging'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
      packages: write
    environment: staging
    strategy:
      matrix:
        include:
          - image: treeseed/api
            target: api
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - image: treeseed/api
            target: api
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - image: treeseed/op-runner
            target: operations-runner
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - image: treeseed/op-runner
            target: operations-runner
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - run: npm ci --ignore-scripts || (echo "dependency install failed; retrying" && npm ci --ignore-scripts)
      - name: Compute image tags
        id: tags
        run: |
          short_sha="${GITHUB_SHA::12}"
          echo "base=dev-staging-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "moving=dev-staging" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ vars.TREESEED_DOCKERHUB_USERNAME }}
          password: ${{ secrets.TREESEED_DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ matrix.image }}:${{ steps.tags.outputs.base }}-${{ matrix.arch }}

  manifest:
    needs: build
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/staging'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    environment: staging
    strategy:
      matrix:
        include:
          - image: treeseed/api
          - image: treeseed/op-runner
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ vars.TREESEED_DOCKERHUB_USERNAME }}
          password: ${{ secrets.TREESEED_DOCKERHUB_TOKEN }}
      - name: Compute image tags
        id: tags
        run: |
          short_sha="${GITHUB_SHA::12}"
          echo "base=dev-staging-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "moving=dev-staging" >> "$GITHUB_OUTPUT"
      - name: Publish multi-architecture manifest
        run: |
          docker buildx imagetools create \
            -t "${{ matrix.image }}:${{ steps.tags.outputs.base }}" \
            -t "${{ matrix.image }}:${{ steps.tags.outputs.moving }}" \
            "${{ matrix.image }}:${{ steps.tags.outputs.base }}-amd64" \
            "${{ matrix.image }}:${{ steps.tags.outputs.base }}-arm64"
