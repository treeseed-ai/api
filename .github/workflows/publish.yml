name: Publish Image TreeSeed API

on:
  workflow_dispatch:
  push:
    tags:
      - "*.*.*"

jobs:
  build:
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
      id-token: write
      packages: write
    environment: production
    strategy:
      matrix:
        include:
          - image: treeseed/api
            target: api
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - image: treeseed/api
            target: api
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - image: treeseed/op-runner
            target: operations-runner
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - image: treeseed/op-runner
            target: operations-runner
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - run: npm ci --ignore-scripts || (echo "dependency install failed; retrying" && npm ci --ignore-scripts)
      - name: Compute image tags
        id: tags
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "base=${version}" >> "$GITHUB_OUTPUT"
          echo "moving=" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ vars.TREESEED_DOCKERHUB_USERNAME }}
          password: ${{ secrets.TREESEED_DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ matrix.image }}:${{ steps.tags.outputs.base }}-${{ matrix.arch }}
          sbom: true
          provenance: mode=max

  manifest:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    environment: production
    strategy:
      matrix:
        include:
          - image: treeseed/api
          - image: treeseed/op-runner
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ vars.TREESEED_DOCKERHUB_USERNAME }}
          password: ${{ secrets.TREESEED_DOCKERHUB_TOKEN }}
      - name: Compute image tags
        id: tags
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "base=${version}" >> "$GITHUB_OUTPUT"
          echo "moving=" >> "$GITHUB_OUTPUT"
      - name: Publish multi-architecture manifest
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            -t "${{ matrix.image }}:${{ steps.tags.outputs.base }}" \
            "${{ matrix.image }}:${{ steps.tags.outputs.base }}-amd64" \
            "${{ matrix.image }}:${{ steps.tags.outputs.base }}-arm64"
      - name: Verify Docker Hub manifests and attestations
        shell: bash
        run: |
          set -euo pipefail

          verify_attestation() {
            local image="$1"
            local raw
            echo "Verifying Docker Hub attestation for ${image}"
            raw="$(docker buildx imagetools inspect --raw "${image}")"
            if ! grep -q 'application/vnd.in-toto+json' <<<"${raw}"; then
              echo "Missing in-toto attestation manifest for ${image}" >&2
              exit 1
            fi
          }

          base="${{ steps.tags.outputs.base }}"
          image="${{ matrix.image }}"
          for ref in "${image}:${base}-amd64" "${image}:${base}-arm64" "${image}:${base}"; do
            docker buildx imagetools inspect "${ref}" >/dev/null
            verify_attestation "${ref}"
          done
  release:
    needs: manifest
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" --generate-notes --verify-tag
