name: Publish @treeseed/api

on:
  workflow_dispatch:
  push:
    tags:
      - '*.*.*'

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')
    runs-on: ubuntu-latest
    environment:
      name: Production
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          node -e "const fs = require('fs'); const p = JSON.parse(fs.readFileSync('package.json', 'utf8')); if (p.scripts) delete p.scripts.prepare; fs.writeFileSync('package.json', JSON.stringify(p, null, '\t') + '\n');"
          for attempt in 1 2 3; do
            if npm ci --workspaces=false; then
              git checkout -- package.json
              exit 0
            fi
            echo "npm ci failed; retrying (${attempt}/3)."
            sleep $((attempt * 5))
          done
          npm ci --workspaces=false
          git checkout -- package.json

      - name: Validate release tag version
        if: startsWith(github.ref, 'refs/tags/')
        run: npm run release:check-tag -- "${GITHUB_REF_NAME}"

      - name: Verify package
        run: npm run verify

      - name: Publish package
        run: npm run release:publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: api
          platforms: linux/amd64
          push: true
          tags: |
            treeseed/api:${{ github.ref_name }}
            treeseed/api:latest
          sbom: true
          provenance: mode=max
          cache-from: type=gha,scope=treeseed-api-release
          cache-to: type=gha,mode=max,scope=treeseed-api-release

      - name: Publish operations runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: operations-runner
          platforms: linux/amd64
          push: true
          tags: |
            treeseed/op-runner:${{ github.ref_name }}
            treeseed/op-runner:latest
          sbom: true
          provenance: mode=max
          cache-from: type=gha,scope=treeseed-op-runner-release
          cache-to: type=gha,mode=max,scope=treeseed-op-runner-release

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_NAME: '@treeseed/api'
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "GitHub release ${GITHUB_REF_NAME} already exists."
            exit 0
          fi
          gh release create "${GITHUB_REF_NAME}" \
            --verify-tag \
            --title "${PACKAGE_NAME} ${GITHUB_REF_NAME}" \
            --generate-notes
