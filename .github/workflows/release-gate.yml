name: Verify TreeSeed API

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      mailpit:
        image: axllent/mailpit:v1.21
        ports:
          - 1025:1025
          - 8025:8025
    env:
      TREESEED_MAILPIT_URL: http://127.0.0.1:8025
      TREESEED_MAILPIT_SMTP_HOST: 127.0.0.1
      TREESEED_MAILPIT_SMTP_PORT: "1025"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run release:setup || (echo "dependency install failed; retrying" && npm run release:setup)
      - name: Wait for Mailpit
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:8025/api/v1/messages >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Mailpit did not become ready" >&2
          exit 1
      - run: bash -lc 'npm run verify:local'
