name: Verify

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    services:
      mailpit:
        image: axllent/mailpit:v1.21
        ports:
          - 1025:1025
          - 8025:8025
    env:
      CI: "true"
      TREESEED_GITHUB_AUTOMATION_MODE: stub
      TREESEED_STAGE_WAIT_MODE: skip
      TREESEED_AGENT_DISABLE_GIT: "true"
      TREESEED_MAILPIT_URL: http://127.0.0.1:8025
      TREESEED_MAILPIT_SMTP_HOST: 127.0.0.1
      TREESEED_MAILPIT_SMTP_PORT: "1025"
      GH_TOKEN: ${{ secrets.TREESEED_GITHUB_TOKEN || github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Hydrate exact SDK artifact
        timeout-minutes: 20
        shell: bash
        run: |
          set -euo pipefail
          sdk_sha="$(node -e "const spec=require('./package.json').dependencies['@treeseed/sdk']; const match=spec.match(/#([0-9a-f]{40})$/); process.stdout.write(match?.[1] ?? '');")"
          if [[ -z "${sdk_sha}" ]]; then
            echo "Using the exact published SDK version declared by package.json."
            exit 0
          fi
          run_id=""
          for attempt in {1..120}; do
            run_id="$(gh run list --repo treeseed-ai/sdk --workflow verify.yml --commit "${sdk_sha}" --status success --limit 1 --json databaseId --jq '.[0].databaseId')"
            [[ -n "${run_id}" ]] && break
            sleep 10
          done
          [[ -n "${run_id}" ]]
          mkdir -p artifacts/sdk
          gh run download "${run_id}" --repo treeseed-ai/sdk --name "sdk-${sdk_sha}" --dir artifacts/sdk

      - name: Install dependencies
        timeout-minutes: 20
        run: |
          npm ci --ignore-scripts --workspaces=false --no-audit --no-fund
          sdk_archive="$(find artifacts/sdk -name '*.tgz' -type f -print -quit 2>/dev/null || true)"
          if [[ -n "${sdk_archive}" ]]; then
            rm -rf node_modules/@treeseed/sdk
            mkdir -p node_modules/@treeseed/sdk
            tar -xzf "${sdk_archive}" --strip-components=1 -C node_modules/@treeseed/sdk
          else
            node -e "const expected=require('./package.json').dependencies['@treeseed/sdk']; const actual=require('./node_modules/@treeseed/sdk/package.json').version; if(actual!==expected) throw new Error('SDK version mismatch: expected '+expected+', received '+actual);"
          fi
          test -f node_modules/@treeseed/sdk/package.json
          test -d node_modules/@treeseed/sdk/dist
      - name: Wait for Mailpit
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:8025/api/v1/messages >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Mailpit did not become ready" >&2
          exit 1
      - run: npm run verify:direct
      - name: Pack verified artifact
        run: mkdir -p artifacts && npm pack --json --ignore-scripts --pack-destination artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: api-${{ github.sha }}
          path: artifacts/*.tgz
          if-no-files-found: error
