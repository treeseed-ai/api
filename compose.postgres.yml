services:
  treeseed-api-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: treeseed_api
      POSTGRES_USER: treeseed
      POSTGRES_PASSWORD: ${TREESEED_LOCAL_POSTGRES_PASSWORD:?TREESEED_LOCAL_POSTGRES_PASSWORD must be injected by trsd for local Docker Compose.}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U treeseed -d treeseed_api"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "${TREESEED_LOCAL_POSTGRES_PORT:-54329}:5432"
    volumes:
      - treeseed-api-postgres-volume:/var/lib/postgresql/data

volumes:
  treeseed-api-postgres-volume:
