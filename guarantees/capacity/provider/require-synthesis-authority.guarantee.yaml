notes:
  - "Unknown explicit sessions are rejected rather than replaced by a different open session; expired and cross-environment sessions are rejected."
  - "Planning-input, capacity-plan, and live-workday denials are inspectable through the capacity audit API and `trsd capacity audit-events`."
  - "Live-workday synthesis strictly decodes its durable run and artifact evidence sources and fails visibly when that state is corrupt or unavailable."
  - "Assignment admission propagates project architecture/team storage uncertainty and never fabricates fallback project context from an incomplete control-plane read."
  - "Admission, grant, workday, allocation, session, and replay JSON use one strict durable-state decoder; malformed governance evidence cannot become empty/default policy."
