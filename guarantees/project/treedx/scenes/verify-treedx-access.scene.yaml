schemaVersion: treeseed.scene/v1
id: project.treedx.verify-treedx-access
title: Verify TreeDX Access
description: Scene scaffold for Verify TreeDX Access.
audience:
  - operator
  - evaluator
journey:
  kind: service
  proves:
    - Verify TreeDX Access opens the canonical @treeseed/api dashboard read model workflow.
    - Verify TreeDX Access exercises a service journey instead of only loading /app/projects/seed-project/knowledge.
    - Verify TreeDX Access records reviewable evidence for the visible result before activation.
  minimumSteps: 2
  requiresInteractiveAction: true
  consumesState:
    - key: auth.owner
      kind: user
    - key: project.primary
      kind: project
mode:
  test: true
  demo: true
  training: true
target:
  app: market
  environment: local
  baseUrl: auto
  browser: chromium
  viewport:
    width: 1600
    height: 900
devices:
  defaultProfile: desktop
  profiles:
    - id: desktop
      title: Desktop
      orientation: landscape
      viewport:
        width: 1600
        height: 900
      video:
        width: 1600
        height: 900
      output:
        width: 1920
        height: 1080
      deviceScaleFactor: 1
      isMobile: false
      hasTouch: false
setup:
  auth:
    required: true
    role: owner
  dev:
    required: true
    command: trsd dev start --web-runtime local --json
    reuseExisting: true
artifacts:
  trace: true
  video: true
  screenshots: true
  console: true
  network: true
  timeline: true
  appLogs: true
workflow:
  - id: open-entry-route
    title: Open Verify TreeDX Access
    action:
      goto: /app/hosts/knowledge-library
    expect:
      urlIncludes: /app/hosts/knowledge-library
  - id: inspect-service-surface
    title: Inspect Verify TreeDX Access service surface
    action:
      keyboard: Tab
    expect:
      urlIncludes: /app/hosts/knowledge-library
chapters: []
overlays: []
diagrams: []
render:
  remotion:
    composition: treeseed-training-default
    output:
      format: mp4
      fps: 30
      resolution:
        width: 1920
        height: 1080
    capture:
      viewport:
        width: 1600
        height: 900
      video:
        width: 1600
        height: 900
      evidenceFit: fixed-browser
runtime:
  mode: training
  timeouts:
    sceneSeconds: 300
    chapterSeconds: 120
    stepSeconds: 60
  checkpoints:
    enabled: true
    defaultResumable: true
    everyStep: true
  progress:
    heartbeatSeconds: 15
  failure:
    continueOnFailure: false
training:
  formats:
    - json
    - markdown
    - vtt
    - srt
visualAudit:
  enabled: false
