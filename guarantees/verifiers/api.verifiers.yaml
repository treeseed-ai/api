schemaVersion: treeseed.guarantee-verifiers/v1
ownerPackage: "@treeseed/api"
verifiers:
  api.capacity.provider.membership-admission-workflow:
    kind: vitestCase
    ownerPackage: "@treeseed/api"
    testFile: tests/integration/repositories/capacity-registration-governance.test.ts
    testName: runs registration through governed admission and exactly-once settlement as one service workflow
  api.capacity.assignment.execution-run-projection:
    kind: vitestCase
    ownerPackage: "@treeseed/api"
    testFile: tests/integration/repositories/capacity-admission-settlement.test.ts
    testName: commits reservation and assignment together, enforces counters, and settles exactly once
  api.capacity.assignment.execution-run-failure-visible:
    kind: vitestCase
    ownerPackage: "@treeseed/api"
    testFile: tests/integration/repositories/execution-run-repository.test.ts
    testName: surfaces telemetry read failure instead of returning an incomplete forensic projection
  api.capacity.usage.repository-fails-closed:
    kind: vitestCase
    ownerPackage: "@treeseed/api"
    testFile: tests/integration/repositories/task-usage-repository.test.ts
    testName: fails closed for malformed durable usage evidence
  api.capacity.admission.durable-json-fails-closed:
    kind: vitestCase
    ownerPackage: "@treeseed/api"
    testFile: tests/contract/api/durable-capacity-json.test.ts
    testName: fails closed for malformed grant and admission durable JSON
  api.capacity.request-json.strict-object:
    kind: vitestCase
    ownerPackage: "@treeseed/api"
    testFile: tests/contract/api/capacity-request-json.test.ts
    testName: rejects malformed JSON and every non-object JSON root with one stable contract
  api.capacity.request-json.mutation-fails-closed:
    kind: vitestCase
    ownerPackage: "@treeseed/api"
    testFile: tests/contract/api/capacity-request-json.test.ts
