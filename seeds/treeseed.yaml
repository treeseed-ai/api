operationRecipes:
  - id: full-private-team-demo
    title: Full private team demo
    environments: [local]
    entrypoints:
      - homepage-story
    steps:
      - id: homepage-story
        title: Show marketplace-first homepage
        actor: visitor
        channel: ui
        operation: navigate
        target: /
        assertions:
          - text: Direction, Capacity, Situation, Results, Memory
          - text: TreeSeed first-party projects
        artifacts:
          - screenshot: homepage-marketplace.png

      - id: apply-scaffold
        title: Reconcile canonical seed scaffold
        actor: operator
        channel: cli
        operation: seed.apply
        uses:
          - team:treeseed
          - project:treeseed/market
          - project:treeseed/api
          - project:treeseed/treedx
          - project:treeseed/sdk
          - project:treeseed/ui
          - project:treeseed/cli
          - project:treeseed/core
          - project:treeseed/admin
          - project:treeseed/agent
          - capacity-provider:treeseed/local-dev
        command:
          argv: ["trsd", "seed", "treeseed", "--environments", "local", "--apply", "--json"]

      - id: verify-private-treedx
        title: Verify TreeDX and project architecture trust
        actor: team-admin
        channel: ui
        operation: verify.treedx
        dependsOn: [apply-scaffold]
        uses:
          - team:treeseed
          - project:treeseed/treedx
        target: /app/hosts/knowledge-library
        assertions:
          - text: TreeDX is the canonical data plane
          - text: mirrors and shares
        artifacts:
          - screenshot: private-treedx.png

      - id: verify-template-projects
        title: Verify Engineering and Research starter sources
        actor: team-admin
        channel: ui
        operation: project.create
        dependsOn: [verify-private-treedx]
        uses:
          - product:treeseed/engineering-template
          - product:treeseed/research-template
        target: /app/projects/new
        assertions:
          - text: Engineering
          - text: Research
        artifacts:
          - screenshot: starter-projects.png

      - id: create-capacity-provider
        title: Create local Codex capacity provider
        actor: team-admin
        channel: ui
        operation: capacity-provider.create
        dependsOn: [verify-template-projects]
        uses:
          - capacity-provider:treeseed/local-dev
        target: /app/capacity/providers/new
        assertions:
          - field: dailyUsageCapPercent
            equals: 30
          - textAbsent: credits
        artifacts:
          - screenshot: capacity-provider-before-submit.png

      - id: launch-provider-runtime
        title: Launch provider runtime from generated env
        actor: operator
        channel: cli
        operation: capacity.up
        dependsOn: [create-capacity-provider]
        uses:
          - capacity-provider:treeseed/local-dev
        command:
          argv: ["trsd", "capacity", "up", "--market", "local", "--provider", "local", "--json"]

      - id: verify-provider-registration
        title: Verify provider registration health
        actor: team-admin
        channel: ui
        operation: capacity.status
        dependsOn: [launch-provider-runtime]
        uses:
          - capacity-provider:treeseed/local-dev
        target: /app/capacity
        assertions:
          - text: registered
          - text: healthy
        artifacts:
          - screenshot: capacity-provider-registered.png

      - id: allocate-portfolio
        title: Allocate provider capacity across projects
        actor: team-admin
        channel: ui
        operation: capacity.allocate.portfolio
        dependsOn: [verify-provider-registration]
        uses:
          - project:treeseed/market
          - project:treeseed/api
          - project:treeseed/treedx
          - project:treeseed/sdk
          - project:treeseed/ui
          - project:treeseed/cli
          - project:treeseed/core
          - project:treeseed/admin
          - project:treeseed/agent
        target: /app/capacity/allocation
        assertions:
          - text: Project portfolio allocation
          - text: 30% daily native usage
        artifacts:
          - screenshot: capacity-allocation-portfolio.png

      - id: allocate-agent-classes
        title: Allocate project capacity across agent classes
        actor: team-admin
        channel: ui
        operation: capacity.allocate.project
        dependsOn: [allocate-portfolio]
        uses:
          - project:treeseed/market
        target: /app/capacity/allocation
        assertions:
          - text: agent classes
          - text: Back to portfolio
        artifacts:
          - screenshot: capacity-allocation-agent-classes.png

      - id: review-work-and-memory
        title: Review work, decisions, artifacts, and publishable memory
        actor: reviewer
        channel: ui
        operation: knowledge.inspect-artifacts
        dependsOn: [allocate-agent-classes]
        uses:
          - project:treeseed/market
        target: /app/knowledge/artifacts
        assertions:
          - text: Artifacts
        artifacts:
          - screenshot: knowledge-artifacts.png
