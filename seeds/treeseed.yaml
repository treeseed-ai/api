      team: team:treeseed
      slug: market
      name: TreeSeed Market
      description: Top-level market application and control plane.
      kind: market_app
      repository:
        role: primary
        provider: github
        owner: knowledge-coop
        name: market
        gitUrl: https://github.com/knowledge-coop/market.git
        defaultBranch: main
        checkoutPath: .
      architecture:
        topology: single_repository_site
        rootPath: .
        sitePath: .
        contentPath: src/content
        contentRuntimeSource: r2_published_manifest
        localContentMaterialization: existing_path
        contentPublishTarget:
          kind: cloudflare_r2
          prefix: market
      metadata:
        demoRole: market-control-plane
        visibility: private

    - key: project:treeseed/api
      team: team:treeseed
      slug: api
      name: TreeSeed API
      description: TreeSeed API first-party package project.
      kind: package
