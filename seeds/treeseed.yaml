name: treeseed
version: 1
description: TreeSeed platform development and operations portfolio

defaultEnvironments:
  - local

environments:
  - local
  - staging
  - prod

resources:
  teams:
    - key: team:treeseed
      slug: treeseed
      name: treeseed
      displayName: TreeSeed
      profileSummary: TreeSeed platform market, integrated package, and agent operations.

  projects:
    - key: project:treeseed/market
      team: team:treeseed
      slug: market
      name: TreeSeed Market
      description: Top-level market application and control plane.
      kind: market_app
      repository:
        role: primary
        provider: github
        owner: knowledge-coop
        name: market
        gitUrl: https://github.com/knowledge-coop/market.git
        defaultBranch: main
        checkoutPath: .
      metadata:
        demoRole: market-control-plane
        repositoryTopology:
          contentRepository:
            accessMode: treedx
          siteRepository:
            accessMode: filesystem
          projectRepository:
            accessMode: filesystem

    - key: project:karyon/live-proof
      team: team:treeseed
      slug: karyon
      name: Karyon Live Proof
      description: Live case-study knowledge project proving TreeSeed governance against the Karyon docs corpus.
      kind: knowledge_hub
      repository:
        role: primary
        provider: github
        owner: karyon-life
        name: karyon
        gitUrl: https://github.com/karyon-life/karyon.git
        defaultBranch: main
        checkoutPath: .treeseed/projects/karyon
        submodulePath: docs
      metadata:
        demoRole: live-proof-project
        proofProject: true
        contentRoot: docs
        repositoryTopology:
          contentRepository:
            accessMode: treedx
            sourcePath: docs
          siteRepository:
            accessMode: filesystem
          projectRepository:
            accessMode: filesystem

  capacityProviders:
    - key: capacity-provider:treeseed/local-dev
      environments: [local]
      team: team:treeseed
      name: treeseed-local-dev
      kind: local
      provider: local
      billingScope: team
      creditBudgetMode: derived
      maxConcurrentWorkdays: 2
      maxConcurrentWorkers: 4
      executionProviders:
        - id: treeseed-local-codex
          name: Local Codex capacity
          kind: codex_subscription
          nativeUnit: wall_minute
          quotaVisibility: opaque
          maxConcurrentWorkers: 4
          resetCadence: daily
          nativeLimits:
            - scope: daily
              nativeUnit: wall_minute
              limitAmount: 480
              reserveBufferPercent: 20
              resetCadence: daily
              confidence: estimated
              source: configured
      registration:
        apiKey:
          createIfMissing: true
          name: TreeSeed local provider security code
          plaintextKey: tsp_local_treeseed_demo_capacity_provider
          scopes:
            - provider:register
            - provider:heartbeat
            - provider:portfolio:read
            - provider:tasks:claim
            - provider:tasks:update
            - provider:usage:report
            - provider:reports:write
            - provider:capabilities:write

  capacityGrants:
    - key: capacity-grant:treeseed/local/market
      environments: [local]
      provider: capacity-provider:treeseed/local-dev
      team: team:treeseed
      project: project:treeseed/market
      environment: local
      grantScope: project
      portfolioAllocationPercent: 100
      reservePoolPercent: 10
      maxDailyProjectCredits: 5000
      priorityWeight: 1
      overflowPolicy: soft_grant

  workPolicies:
    - key: work-policy:treeseed/local/market
      environments: [local]
      project: project:treeseed/market
      environment: local
      enabled: true
      startCron: "0 9 * * 1-5"
      durationMinutes: 480
      maxRunners: 1
      maxWorkersPerRunner: 4
      dailyCreditBudget: 5000
      maxQueuedTasks: 100
      maxQueuedCredits: 10000

    - key: work-policy:treeseed/staging/market
      environments: [staging]
      project: project:treeseed/market
      environment: staging
      enabled: true
      startCron: "0 9 * * 1-5"
      durationMinutes: 480
      maxRunners: 1
      maxWorkersPerRunner: 4
      dailyCreditBudget: 2500
      maxQueuedTasks: 50
      maxQueuedCredits: 5000

    - key: work-policy:treeseed/prod/market
      environments: [prod]
      project: project:treeseed/market
      environment: prod
      enabled: true
      startCron: "0 9 * * 1-5"
      durationMinutes: 480
      maxRunners: 1
      maxWorkersPerRunner: 4
      dailyCreditBudget: 2500
      maxQueuedTasks: 50
      maxQueuedCredits: 5000

  repositoryHosts:
    - key: repository-host:treeseed/market-github
      team: team:treeseed
      provider: github
      name: knowledge-coop
      ownership: treeseed_managed
      accountLabel: Knowledge Coop GitHub organization
      organizationOrOwner: knowledge-coop
      defaultVisibility: public
      softwareRepositoryNameTemplate: "{project}"
      contentRepositoryNameTemplate: "{project}-content"
      allowedProjectKinds: [market_app, package, knowledge_hub]
      status: active

  hubRepositories:
    - key: hub-repository:karyon/content-docs
      project: project:karyon/live-proof
      role: content
      provider: github
      owner: karyon-life
      name: karyon
      gitUrl: https://github.com/karyon-life/karyon.git
      defaultBranch: main
      submodulePath: docs
      status: active
      accessPolicy:
        contentAccessMode: treedx
        sourcePath: docs
      publishPolicy:
        publishSource: treedx_to_r2
      metadata:
        contentCanonical: treedx
        demoRole: karyon-docs-content

  products:
    - key: product:treeseed/market-template
      team: team:treeseed
      kind: template
      slug: treeseed-market
      title: TreeSeed Market Starter
      summary: First-party TreeSeed market control plane starter bundle.
      visibility: public
      listingEnabled: true
      offerMode: free
      manifestKey: seeds/treeseed.yaml
      artifactKey: catalog/treeseed-market/1.0.0/template
      searchText: TreeSeed market control plane starter template
      metadata:
        provider: github
        owner: knowledge-coop
        repository: market
        gitUrl: https://github.com/knowledge-coop/market.git
    - key: product:treeseed/engineering-template
      team: team:treeseed
      kind: template
      slug: engineering
      title: Engineering Workflow Import
      summary: First-party starter for governed engineering work, release checks, and operational memory.
      visibility: public
      listingEnabled: true
      offerMode: free
      manifestKey: src/content/templates/engineering.mdx
      artifactKey: catalog/treeseed-engineering/1.0.0/template
      searchText: TreeSeed engineering workflow import template capacity governance release checks
      metadata:
        provider: github
        owner: treeseed-templates
        repository: engineering
        gitUrl: https://github.com/treeseed-templates/engineering.git

    - key: product:treeseed/research-template
      team: team:treeseed
      kind: template
      slug: research
      title: Research Workflow Import
      summary: First-party starter for source-backed research bodies, synthesis notes, and reusable knowledge packs.
      visibility: public
      listingEnabled: true
      offerMode: free
      manifestKey: src/content/templates/research.mdx
      artifactKey: catalog/treeseed-research/1.0.0/template
      searchText: TreeSeed research workflow import template knowledge pack source backed
      metadata:
        provider: github
        owner: treeseed-templates
        repository: research
        gitUrl: https://github.com/treeseed-templates/research.git

    - key: product:treeseed/information-hub-template
      team: team:treeseed
      kind: template
      slug: information-hub
      title: Information Hub Workflow Import
      summary: First-party starter for public knowledge hubs, docs, and durable publishing workflows.
      visibility: public
      listingEnabled: true
      offerMode: free
      manifestKey: src/content/templates/information-hub.mdx
      artifactKey: catalog/treeseed-information-hub/1.0.0/template
      searchText: TreeSeed information hub workflow import template docs knowledge publishing
      metadata:
        provider: github
        owner: treeseed-templates
        repository: information-hub
        gitUrl: https://github.com/treeseed-templates/information-hub.git

  catalogArtifacts:
    - key: catalog-artifact:treeseed/market-template/1.0.0
      product: product:treeseed/market-template
      version: 1.0.0
      kind: template
      contentKey: catalog/treeseed-market/1.0.0/template
      manifestKey: seeds/treeseed.yaml
      metadata:
        provider: github
        owner: knowledge-coop
        repository: market
        gitUrl: https://github.com/knowledge-coop/market.git
    - key: catalog-artifact:treeseed/engineering-template/1.0.0
      product: product:treeseed/engineering-template
      version: 1.0.0
      kind: template
      contentKey: catalog/treeseed-engineering/1.0.0/template
      manifestKey: src/content/templates/engineering.mdx
      metadata:
        provider: github
        owner: treeseed-templates
        repository: engineering
        gitUrl: https://github.com/treeseed-templates/engineering.git

    - key: catalog-artifact:treeseed/research-template/1.0.0
      product: product:treeseed/research-template
      version: 1.0.0
      kind: template
      contentKey: catalog/treeseed-research/1.0.0/template
      manifestKey: src/content/templates/research.mdx
      metadata:
        provider: github
        owner: treeseed-templates
        repository: research
        gitUrl: https://github.com/treeseed-templates/research.git

    - key: catalog-artifact:treeseed/information-hub-template/1.0.0
      product: product:treeseed/information-hub-template
      version: 1.0.0
      kind: template
      contentKey: catalog/treeseed-information-hub/1.0.0/template
      manifestKey: src/content/templates/information-hub.mdx
      metadata:
        provider: github
        owner: treeseed-templates
        repository: information-hub
        gitUrl: https://github.com/treeseed-templates/information-hub.git

  agentPools: []
