entries:
  TREESEED_WEB_SERVICE_ID:
    label: API service caller ID
    group: auth
    description: Stable internal service identity used by trusted web, smoke, and API-adjacent clients when they call the Treeseed API.
    howToGet: Use a short service identifier such as web.
    sensitivity: plain
    targets:
      - local-runtime
      - railway-var
      - github-variable
      - cloudflare-var
    appTargets:
      - api
    serviceTargets:
      - api
    scopes:
      - local
      - staging
      - prod
    storage: shared
    requirement: required
    purposes:
      - dev
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
    defaultValueRef: webServiceIdDefault
    localDefaultValueRef: webServiceIdDefault
    relevanceRef: apiSurfaceEnabled
  TREESEED_WEB_SERVICE_SECRET:
    label: API service caller secret
    group: auth
    description: Shared secret used by trusted web, smoke, and API-adjacent clients to authenticate internal calls to the Treeseed API.
    howToGet: Generate a strong random secret and configure the same value on callers and the API service.
    sensitivity: secret
    targets:
      - local-runtime
      - railway-secret
      - github-secret
      - cloudflare-secret
    appTargets:
      - api
    serviceTargets:
      - api
    scopes:
      - local
      - staging
      - prod
    storage: shared
    requirement: required
    purposes:
      - dev
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
    defaultValueRef: generatedSecret
    localDefaultValueRef: generatedSecret
    relevanceRef: apiSurfaceEnabled
  TREESEED_DATABASE_URL:
    label: Treeseed PostgreSQL database URL
    group: hosting
    cluster: hosting:treeseed-control-plane
    visibility: system
    description: PostgreSQL connection URL for Treeseed control-plane tables. Local development derives this from the managed local API Postgres configuration; hosted environments receive the reconciled Railway PostgreSQL connection URL. Browser/UI code must never receive this value.
    howToGet: For local development, Treeseed derives this from the local API Postgres port and database defaults. For staging and production, provision the managed Treeseed PostgreSQL resource through Treeseed/Railway reconciliation and store the generated connection URL as a service secret.
    sensitivity: secret
    targets:
      - local-runtime
      - railway-secret
    appTargets:
      - api
    serviceTargets:
      - api
      - operationsRunner
    scopes:
      - local
      - staging
      - prod
    storage: scoped
    requirement: optional
    purposes:
      - deploy
      - config
    validation:
      kind: url
    sourcePriority:
      - generated
      - machine-config
      - process-env
    localDefaultValueRef: localApiDatabaseUrlDefault
  TREESEED_CAPACITY_ACCEPTANCE_API_URL:
    label: Capacity acceptance API URL
    group: capacity-provider
    description: Base URL used by local and hosted capacity-provider acceptance proofs when creating and verifying diagnostic assignments.
    howToGet: Local development derives this from the managed API base URL; hosted environments should set it to the target Treeseed API URL.
    sensitivity: plain
    targets:
      - local-runtime
      - railway-var
    appTargets:
      - api
    serviceTargets:
      - api
      - operationsRunner
    scopes:
      - local
      - staging
      - prod
    storage: scoped
    requirement: optional
    purposes:
      - dev
      - test
      - config
    validation:
      kind: url
    sourcePriority:
      - generated
      - machine-config
      - process-env
  TREESEED_CAPACITY_ACCEPTANCE_ADMIN_TOKEN:
    label: Capacity acceptance admin token
    group: capacity-provider
    description: Team-management token used by capacity acceptance proof to create isolated diagnostic assignment records. In local development this may use the local-only generated acceptance token.
    howToGet: Local development uses the generated local-only acceptance token; hosted environments should provide a scoped team-management token for the proof team.
    sensitivity: secret
    targets:
      - local-runtime
      - railway-secret
    appTargets:
      - api
    serviceTargets:
      - api
      - operationsRunner
    scopes:
      - local
      - staging
      - prod
    storage: scoped
    requirement: optional
    purposes:
      - dev
      - test
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - generated
      - machine-config
      - process-env
  TREESEED_CAPACITY_ACCEPTANCE_TEAM_ID:
    label: Capacity acceptance team id
    group: capacity-provider
    description: Team id or slug used by capacity acceptance proof.
    howToGet: Local development derives this from the seeded Treeseed team; hosted environments should use the dedicated proof team id.
    sensitivity: plain
    targets:
      - local-runtime
      - railway-var
    appTargets:
      - api
    serviceTargets:
      - api
      - operationsRunner
    scopes:
      - local
      - staging
      - prod
    storage: scoped
    requirement: optional
    purposes:
      - dev
      - test
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - generated
      - machine-config
      - process-env
  TREESEED_CAPACITY_ACCEPTANCE_PROJECT_ID:
    label: Capacity acceptance project id
    group: capacity-provider
    description: Project id or slug used by capacity acceptance proof.
    howToGet: Local development derives this from the seeded Market project; hosted environments should use the dedicated proof project id.
    sensitivity: plain
    targets:
      - local-runtime
      - railway-var
    appTargets:
      - api
    serviceTargets:
      - api
      - operationsRunner
    scopes:
      - local
      - staging
      - prod
    storage: scoped
    requirement: optional
    purposes:
      - dev
      - test
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - generated
      - machine-config
      - process-env
  TREESEED_CAPACITY_ACCEPTANCE_PROVIDER_ID:
    label: Capacity acceptance provider id
    group: capacity-provider
    description: Capacity provider id used by capacity acceptance proof.
    howToGet: Local development derives this from the seeded local provider; hosted environments should use the registered proof capacity provider id.
    sensitivity: plain
    targets:
      - local-runtime
      - railway-var
    appTargets:
      - api
    serviceTargets:
      - api
      - operationsRunner
    scopes:
      - local
      - staging
      - prod
    storage: scoped
    requirement: optional
    purposes:
      - dev
      - test
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - generated
      - machine-config
      - process-env
  TREESEED_CAPACITY_ACCEPTANCE_AGENT_CLASS_ID:
    label: Capacity acceptance agent class id
    group: capacity-provider
    description: Project agent class id used by capacity acceptance proof; local proof creates this diagnostic class when absent.
    howToGet: Local development uses the generated planning class id; hosted environments should use an agent class available to the proof project.
    sensitivity: plain
    targets:
      - local-runtime
      - railway-var
    appTargets:
      - api
    serviceTargets:
      - api
      - operationsRunner
    scopes:
      - local
      - staging
      - prod
    storage: scoped
    requirement: optional
    purposes:
      - dev
      - test
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - generated
      - machine-config
      - process-env
  TREESEED_CAPACITY_ACCEPTANCE_ENVIRONMENT:
    label: Capacity acceptance environment
    group: capacity-provider
    description: Environment label used by capacity acceptance proof.
    howToGet: Local development uses local; hosted acceptance should set this to staging.
    sensitivity: plain
    targets:
      - local-runtime
      - railway-var
    appTargets:
      - api
    serviceTargets:
      - api
      - operationsRunner
    scopes:
      - local
      - staging
      - prod
    storage: scoped
    requirement: optional
    purposes:
      - dev
      - test
      - config
    validation:
      kind: enum
      values:
        - local
        - staging
        - prod
    sourcePriority:
      - generated
      - machine-config
      - process-env
  TREESEED_PLATFORM_RUNNER_SECRET:
    appTargets:
      - api
    serviceTargets:
      - api
      - operationsRunner
  TREESEED_PLATFORM_RUNNER_ID:
    appTargets:
      - api
    serviceTargets:
      - operationsRunner
  TREESEED_PLATFORM_RUNNER_DATA_DIR:
    appTargets:
      - api
    serviceTargets:
      - operationsRunner
  TREESEED_PLATFORM_RUNNER_ENVIRONMENT:
    appTargets:
      - api
    serviceTargets:
      - operationsRunner
  TREESEED_CREDENTIAL_SESSION_SECRET:
    label: Treeseed credential session secret
    group: hosting
    cluster: hosting:treeseed-control-plane
    visibility: user
    description: Secret used by the API and operations runner to encrypt provider credential session payloads.
    howToGet: Generate a strong random secret and store it through `treeseed config` for staging and production.
    sensitivity: secret
    targets:
      - github-secret
      - railway-secret
    appTargets:
      - api
    serviceTargets:
      - api
      - operationsRunner
    scopes:
      - staging
      - prod
    storage: scoped
    requirement: optional
    purposes:
      - deploy
      - config
    validation:
      kind: nonempty
      minLength: 24
    sourcePriority:
      - machine-config
      - process-env
    defaultValueRef: generatedSecret
  TREESEED_GITHUB_APP_ID:
    label: Treeseed GitHub App ID
    group: github
    cluster: secrets-capability:github-app
    visibility: system
    description: GitHub App id used by the API to observe installations and mint short-lived installation tokens.
    howToGet: Create the Treeseed GitHub App and copy its numeric App ID from GitHub App settings.
    sensitivity: plain
    targets:
      - railway-var
      - github-variable
    appTargets:
      - api
    serviceTargets:
      - api
      - operationsRunner
    scopes:
      - staging
      - prod
    storage: scoped
    requirement: optional
    purposes:
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
  TREESEED_GITHUB_APP_CLIENT_ID:
    label: Treeseed GitHub App client ID
    group: github
    cluster: secrets-capability:github-app
    visibility: system
    description: Optional GitHub App client id used for installation and onboarding URLs when the API needs to present connected-mode GitHub App flows.
    howToGet: Copy the Client ID from the Treeseed GitHub App settings when onboarding flows need it.
    sensitivity: plain
    targets:
      - railway-var
      - github-variable
    appTargets:
      - api
    serviceTargets:
      - api
      - operationsRunner
    scopes:
      - staging
      - prod
    storage: scoped
    requirement: optional
    purposes:
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
  TREESEED_GITHUB_APP_PRIVATE_KEY:
    label: Treeseed GitHub App private key
    group: github
    cluster: secrets-capability:github-app
    visibility: system
    description: Bootstrap service secret used only by the API GitHub App adapter to sign installation token requests.
    howToGet: Generate a private key for the Treeseed GitHub App and store the PEM value as a secret.
    sensitivity: secret
    targets:
      - railway-secret
      - github-secret
    appTargets:
      - api
    serviceTargets:
      - api
      - operationsRunner
    scopes:
      - staging
      - prod
    storage: scoped
    requirement: optional
    purposes:
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
  TREESEED_GITHUB_APP_WEBHOOK_SECRET:
    label: Treeseed GitHub App webhook secret
    group: github
    cluster: secrets-capability:github-app
    visibility: system
    description: Shared webhook secret used by the API to validate GitHub App installation and repository grant events.
    howToGet: Generate a strong webhook secret in GitHub App settings and store the same value as a service secret.
    sensitivity: secret
    targets:
      - railway-secret
      - github-secret
    appTargets:
      - api
    serviceTargets:
      - api
    scopes:
      - staging
      - prod
    storage: scoped
    requirement: optional
    purposes:
      - deploy
      - config
    validation:
      kind: nonempty
      minLength: 16
    sourcePriority:
      - machine-config
      - process-env
  TREESEED_GITHUB_TOKEN:
    label: Treeseed GitHub token fallback
    group: github
    cluster: secrets-capability:repository-credentials
    visibility: system
    description: Fallback GitHub token used by the API and operations runner for repository and workflow operations only when the GitHub App authority is not configured. Repository-specific overrides use TREESEED_GITHUB_TOKEN_<OWNER>_<REPO> and are resolved before this default.
    howToGet: Create a narrowly scoped GitHub token for Treeseed-owned repositories, or prefer configuring the Treeseed GitHub App for short-lived installation tokens.
    sensitivity: secret
    targets:
      - railway-secret
      - github-secret
    appTargets:
      - api
    serviceTargets:
      - api
      - operationsRunner
    scopes:
      - local
      - staging
      - prod
    storage: shared
    requirement: optional
    purposes:
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
  TREESEED_PUBLIC_TREEDX_IMAGE_REF:
    label: Public TreeDX image reference
    group: railway
    cluster: hosting:public-treedx
    description: Container image reference used for the shared public TreeDX federation node.
    howToGet: Use the TreeDX release image tag that should be deployed for the selected environment.
    sensitivity: plain
    targets:
      - railway-var
      - github-variable
    appTargets:
      - api
    serviceTargets:
      - public-treedx-node-01
    scopes:
      - staging
      - prod
    storage: scoped
    requirement: optional
    purposes:
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
    defaultValueRef: treedxDockerImageDefault
  TREESEED_PUBLIC_TREEDX_RAILWAY_PROJECT_NAME:
    label: API Railway project name for public TreeDX
    group: railway
    cluster: hosting:public-treedx
    description: API-owned Railway project name that hosts the shared public TreeDX federation service.
    howToGet: Keep the API project default unless the whole API app has intentionally moved to another Railway project.
    sensitivity: plain
    targets:
      - railway-var
      - github-variable
    appTargets:
      - api
    serviceTargets:
      - public-treedx-node-01
      - public-treedx-federation
    scopes:
      - staging
      - prod
    storage: shared
    requirement: optional
    purposes:
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
  TREESEED_TREEDX_ADMIN_TOKEN:
    label: Public TreeDX admin token
    group: railway
    cluster: hosting:public-treedx
    visibility: system
    description: Admin token used by Treeseed-managed provisioning and maintenance for the shared public TreeDX federation.
    howToGet: Generate a strong token and store it through Treeseed config or the Railway secret manager.
    sensitivity: secret
    targets:
      - railway-secret
    appTargets:
      - api
    serviceTargets:
      - public-treedx-node-01
    scopes:
      - staging
      - prod
    storage: scoped
    requirement: optional
    purposes:
      - deploy
      - config
    validation:
      kind: nonempty
      minLength: 24
    sourcePriority:
      - machine-config
      - process-env
    defaultValueRef: generatedSecret
  SECRET_KEY_BASE:
    label: Public TreeDX Phoenix secret key base
    group: railway
    cluster: hosting:public-treedx
    visibility: system
    description: Phoenix secret key base required for the public TreeDX federation node to boot in production.
    howToGet: Treeseed generates and preserves this value during hosting reconciliation.
    sensitivity: secret
    targets:
      - railway-secret
    appTargets:
      - api
    serviceTargets:
      - public-treedx-node-01
    scopes:
      - staging
      - prod
    storage: scoped
    requirement: required
    purposes:
      - deploy
      - config
    validation:
      kind: nonempty
      minLength: 48
    sourcePriority:
      - machine-config
      - process-env
    defaultValueRef: generatedSecret
  TREEDX_JWT_HS256_SECRET:
    label: Public TreeDX compatibility JWT secret
    group: railway
    cluster: hosting:public-treedx
    visibility: system
    description: Compatibility verifier secret for public TreeDX federation until Treeseed exposes a JWKS issuer.
    howToGet: Treeseed generates and preserves this value during hosting reconciliation.
    sensitivity: secret
    targets:
      - railway-secret
    appTargets:
      - api
    serviceTargets:
      - public-treedx-node-01
    scopes:
      - staging
      - prod
    storage: scoped
    requirement: required
    purposes:
      - deploy
      - config
    validation:
      kind: nonempty
      minLength: 48
    sourcePriority:
      - machine-config
      - process-env
    defaultValueRef: generatedSecret
  TREEDX_FEDERATION_MODE:
    label: Public TreeDX federation mode
    group: railway
    cluster: hosting:public-treedx
    description: Runtime mode for the shared public TreeDX federation node.
    howToGet: Managed by the API application manifest; keep connected_library for the public TreeDX federation.
    sensitivity: plain
    targets:
      - railway-var
    appTargets:
      - api
    serviceTargets:
      - public-treedx-node-01
    scopes:
      - staging
      - prod
    storage: scoped
    requirement: optional
    purposes:
      - deploy
      - config
    validation:
      kind: enum
      values:
        - connected_library
    sourcePriority:
      - machine-config
      - process-env
