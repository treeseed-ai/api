deploymentFlows:
  - id: deployment-flow.local-acceptance-web-deployment
    actor: teamOwner
    runnerActor: platformRunner
    market: local
    environment: staging
    mockResult: success
    environments: [local]
    expect:
      status: 200
      envelope: { ok: true }

coverage:
  requireAllDescriptors: true
  requireAllSdkMethods: true
  requiredCaseIds:
    - health.ready
    - auth.web.sign-up.sends-confirmation-email
    - descriptor-executable-role-matrix.post.v1.auth.web.sign-up.anonymous
    - auth.web.sign-in.site-admin
    - auth.availability.username.seeded
    - auth.availability.email.seeded
    - site-role-matrix.me.siteAdmin
    - site-role-matrix.platform-operations-read.teamViewer
    - team-role-matrix.team-members.teamOwner
    - team-role-matrix.team-members.nonMember
    - sdk.me.site-admin
    - sdk.teams.team-owner
    - sdk.me.teamOwner
    - deployment-flow.local-acceptance-web-deployment

cases:
  - id: health.ready
    actor: anonymous
    method: GET
    path: /readyz
    expect:
      status: 200

  - id: agent.provider-availability-session.persisted
    actor: siteAdmin
    method: GET
    path: ${apiVersionPath}/teams/${fixtures.team.id}/capacity/availability-sessions
    expect:
      status: 200
      envelope: { ok: true }

  - id: agent.provider-assignment.created
    actor: siteAdmin
    method: GET
    path: ${apiVersionPath}/teams/${fixtures.team.id}/capacity/assignments
    expect:
      status: 200
      envelope: { ok: true }

  - id: agent.assignment-lease.transitioned
    actor: siteAdmin
    method: GET
    path: ${apiVersionPath}/teams/${fixtures.team.id}/capacity/assignments
    expect:
      status: 200
      envelope: { ok: true }

  - id: agent.mode-run.persisted
    actor: siteAdmin
    method: GET
    path: ${apiVersionPath}/projects/${fixtures.project.id}/agent-mode-runs
    expect:
      status: 200
      envelope: { ok: true }

  - id: agent.usage-actual.persisted
    actor: siteAdmin
