id: "@treeseed/api"
name: TreeSeed API
kind: node-typescript
type: hosted-service
repository: treeseed-ai/api
publishTarget: docker
workflowTemplateVersion: "1"
githubEnvironments:
  - staging
  - production
requiredSecrets:
  - DOCKERHUB_TOKEN
verify:
  fast: npm run verify
  local: npm run verify:local
  release: npm run release:verify
artifacts:
  - provider: docker
    name: treeseed/api
    dockerfile: Dockerfile
    target: api
    architectures:
      - amd64
      - arm64
  - provider: docker
    name: treeseed/op-runner
    dockerfile: Dockerfile
    target: operations-runner
    architectures:
      - amd64
      - arm64
releaseGate:
  workflow: release-gate.yml
dockerImages:
  releaseWorkflow: publish.yml
  developmentWorkflow: dev-image.yml
  architectures:
    - amd64
    - arm64
  tags:
    release:
      - "<version>"
      - latest
    staging:
      - "dev-staging-<short-sha>"
      - dev-staging
projectArchitecture:
  topology: single_repository_site
  rootPath: .
  sitePath: docs
  contentPath: docs/src/content
  contentRuntimeSource: r2_published_manifest
  localContentMaterialization: existing_path
  contentPublishTarget:
    kind: cloudflare_r2
    prefix: packages/api
