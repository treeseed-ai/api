id: "@treeseed/api"
name: TreeSeed API
kind: node-typescript
type: hosted-service
repository: treeseed-ai/api
publishTarget: docker
workflowTemplateVersion: "1"
githubEnvironments:
  - staging
  - production
requiredSecrets:
  - DOCKERHUB_TOKEN
verify:
  fast: npm run verify
  local: npm run verify:local
  release: npm run release:verify
artifacts:
  - provider: docker
    name: treeseed/api
    dockerfile: Dockerfile
    target: api
    architectures:
      - amd64
      - arm64
  - provider: docker
    name: treeseed/op-runner
    dockerfile: Dockerfile
    target: operations-runner
    architectures:
      - amd64
      - arm64
releaseGate:
  workflow: release-gate.yml
dockerImages:
  releaseWorkflow: publish.yml
  developmentWorkflow: dev-image.yml
  architectures:
    - amd64
    - arm64
  tags:
    release:
      - "<version>"
      - latest
    staging:
      - "dev-staging-<short-sha>"
      - dev-staging
localDev:
  services:
    api:
      script: dev:api
      hostEnv: HOST
      portEnv: PORT
      defaultPort: 3000
      healthPath: /healthz
    operationsRunner:
      script: dev:runner
  database:
    kind: postgres
    managed: true
    host: 127.0.0.1
    defaultPort: 55432
    portEnv: TREESEED_MARKET_LOCAL_POSTGRES_PORT
    urlEnv: TREESEED_DATABASE_URL
    compatibilityUrlEnv: TREESEED_MARKET_DATABASE_URL
    containerName: treeseed-market-local-postgres
    volumeName: treeseed-market-local-postgres-data
    user: treeseed
    password: treeseed
    database: market_local
  migrations:
    command: node
    args:
      - scripts/migrate-db.mjs
