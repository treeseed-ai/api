id: "@treeseed/api"
name: TreeSeed API
kind: node-typescript
type: hosted-service
repository: treeseed-ai/api
publishTarget: docker
capabilities: { save: true, verify: true, publish: true, deploy: true, localOnly: false }
deploymentSource:
  staging: git
  prod: image
workflowTemplateVersion: "1"
githubEnvironments:
  - staging
  - production
requiredSecrets:
  - TREESEED_DOCKERHUB_TOKEN
requiredVariables:
  - TREESEED_DOCKERHUB_USERNAME
verify:
  fast: npm run verify
  local: npm run verify:local
  release: npm run release:verify
artifacts:
  - provider: docker
    name: treeseed/api
    dockerfile: Dockerfile
    target: api
    architectures:
      - amd64
      - arm64
  - provider: docker
    name: treeseed/op-runner
    dockerfile: Dockerfile
    target: operations-runner
    architectures:
      - amd64
      - arm64
releaseGate:
  workflow: verify.yml
  timeoutSeconds: 1800
dockerImages:
  releaseWorkflow: deploy.yml
  architectures:
    - amd64
    - arm64
  tags:
    release:
      - "<version>"
      - latest
projectArchitecture:
  topology: single_repository_site
  rootPath: .
  sitePath: docs
  contentPath: docs/src/content
  contentRuntimeSource: r2_published_manifest
  localContentMaterialization: existing_path
  contentPublishTarget:
    kind: cloudflare_r2
    prefix: packages/api
localDev:
  services:
    api:
      script: dev:api
      hostEnv: HOST
      portEnv: PORT
      defaultPort: 3000
      healthPath: /healthz
    operationsRunner:
      script: dev:runner
  database:
    kind: postgres
    managed: true
    host: 127.0.0.1
    defaultPort: 54329
    portEnv: TREESEED_MARKET_LOCAL_POSTGRES_PORT
    urlEnv: TREESEED_DATABASE_URL
    compatibilityUrlEnv: TREESEED_MARKET_DATABASE_URL
    containerName: treeseed-api-postgres
    volumeName: treeseed-api-postgres-volume
    user: treeseed
    password: treeseed-local-dev
    database: treeseed_api
  migrations:
    command: node
    args:
      - scripts/migrate-db.ts
