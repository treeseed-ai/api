name: TreeSeed API
slug: treeseed-api
siteUrl: https://api.treeseed.dev
contactEmail: hello@treeseed.email
hosting:
  kind: treeseed_control_plane
  registration: none
  teamId: treeseed
  projectId: api
hub:
  mode: treeseed_hosted
runtime:
  mode: treeseed_managed
  registration: none
surfaces:
  api:
    enabled: true
    provider: railway
    rootDir: .
    localBaseUrl: http://127.0.0.1:3000
    environments:
      staging:
        domain: api.preview.treeseed.dev
      prod:
        domain: api.treeseed.dev
services:
  treeseedDatabase:
    enabled: true
    provider: railway
    railway:
      resourceType: postgres
      serviceName: treeseed-api-postgres
      environmentVariable: TREESEED_DATABASE_URL
      serviceTargets:
        - api
        - operationsRunner
  api:
    enabled: true
    provider: railway
    rootDir: .
    railway:
      projectName: treeseed-api
      serviceName: treeseed-api
      rootDir: .
      imageRefEnv: TREESEED_API_IMAGE_REF
      sourceMode: git
      dockerfilePath: /Dockerfile.api
      buildCommand: npm run build
      startCommand: npm run start:api
      healthcheckPath: /healthz
      healthcheckTimeoutSeconds: 120
      runtimeMode: serverless
    environments:
      local:
        baseUrl: http://127.0.0.1:3000
        railwayEnvironment: local
      staging:
        railwayEnvironment: staging
      prod:
        railwayEnvironment: prod
        railwayServiceName: treeseed-api-production
  operationsRunner:
    enabled: true
    provider: railway
    rootDir: .
    railway:
      projectName: treeseed-api
      serviceName: treeseed-api-operations-runner-01
      rootDir: .
      imageRefEnv: TREESEED_OPERATIONS_RUNNER_IMAGE_REF
      sourceMode: git
      dockerfilePath: /Dockerfile.operations-runner
      buildCommand: npm run build
      startCommand: npm run start:runner
      healthcheckPath: /healthz
      healthcheckTimeoutSeconds: 120
      runtimeMode: service
      volumeMountPath: /data
      runnerPool:
        bootstrapCount: 1
        maxRunners: 4
        volumeMountPath: /data
    environments:
      local:
        baseUrl: http://127.0.0.1:3001
        railwayEnvironment: local
      staging:
        railwayEnvironment: staging
      prod:
        railwayEnvironment: prod
        railwayServiceName: treeseed-api-operations-runner-production
publicTreeDxFederation:
  railway:
    nodePool:
      bootstrapCount: 1
      maxNodes: 4
providers:
  operations: api
  deploy: railway
  dns: cloudflare-dns
